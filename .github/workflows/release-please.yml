name: release-please

on:
  push:
    branches: [main]

# Prefer the same GitHub App-token pattern as the Endstate repos. A non-GITHUB_TOKEN
# credential lets Release Please PRs and releases trigger normal CI/release events.
# If the app secrets are not configured on this repo yet, fall back to GITHUB_TOKEN
# so release automation still works, with GitHub's normal recursion protection.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_APP: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID != '' && secrets.RELEASE_PLEASE_APP_PRIVATE_KEY != '' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Mint GitHub App installation token
        if: env.HAS_RELEASE_APP == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify package version matches release tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          expected = os.environ["TAG"].removeprefix("v")
          with open("pyproject.toml", "rb") as fh:
              actual = tomllib.load(fh)["project"]["version"]
          if actual != expected:
              raise SystemExit(f"pyproject version {actual} does not match release tag {expected}")
          PY

      - name: Build package artifacts
        run: uv build

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber
  publish-pypi:
    needs: [release-please, build-artifacts]
    if: ${{ needs.release-please.outputs.release_created == 'true' && vars.PYPI_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package artifacts
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
